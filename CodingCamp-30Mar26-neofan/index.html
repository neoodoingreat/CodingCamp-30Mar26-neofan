<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense &amp; Budget Visualizer</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <h1>Expense &amp; Budget Visualizer</h1>
    <div class="header-controls">
      <label for="budget-limit">Budget Limit:</label>
      <input
        type="number"
        id="budget-limit"
        name="budget-limit"
        placeholder="e.g. 500"
        min="0"
        step="0.01"
        aria-label="Budget limit"
      />
      <button id="theme-toggle" type="button" aria-label="Toggle dark/light theme">
        Toggle Theme
      </button>
    </div>
  </header>

  <main>
    <section aria-label="Add transaction">
      <h2>Add Transaction</h2>
      <form id="transaction-form" novalidate>
        <div class="form-group">
          <label for="item-name">Item Name</label>
          <input
            type="text"
            id="item-name"
            name="item-name"
            placeholder="e.g. Coffee"
            autocomplete="off"
          />
          <span class="error-msg" id="error-name" role="alert"></span>
        </div>
        <div class="form-group">
          <label for="amount">Amount</label>
          <input
            type="number"
            id="amount"
            name="amount"
            placeholder="e.g. 4.50"
            min="0.01"
            step="0.01"
          />
          <span class="error-msg" id="error-amount" role="alert"></span>
        </div>
        <div class="form-group">
          <label for="category">Category</label>
          <select id="category" name="category">
            <option value="">-- Select --</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Fun">Fun</option>
          </select>
          <span class="error-msg" id="error-category" role="alert"></span>
        </div>
        <button type="submit" id="add-btn">Add Transaction</button>
      </form>
    </section>

    <section aria-label="Balance">
      <div id="balance-display">
        <span id="balance-label">Total Balance</span>
        <span id="balance-amount">$0.00</span>
        <span id="monthly-total" hidden></span>
        <p id="budget-warning" role="alert" hidden></p>
      </div>
    </section>

    <section aria-label="Monthly filter">
      <div id="month-filter">
        <label for="month-selector">Filter by Month:</label>
        <input type="month" id="month-selector" name="month-selector" aria-label="Select month" />
        <button type="button" id="clear-filter-btn">Clear Filter</button>
      </div>
    </section>

    <div id="content-grid">
      <section aria-label="Transaction list">
        <h2>Transactions</h2>
        <ul id="transaction-list" aria-live="polite"></ul>
      </section>

      <section aria-label="Spending chart">
        <h2>Spending by Category</h2>
        <canvas id="spending-chart" aria-label="Pie chart of spending by category" role="img"></canvas>
      </section>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
